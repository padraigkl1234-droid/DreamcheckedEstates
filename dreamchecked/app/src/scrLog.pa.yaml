Screens:
  scrLog As screen:
    Properties:
      Fill: =varNavy

    Children:

    # ── Header bar ──────────────────────────────────────────────────────────
    - recLogHeader As rectangle:
        Properties:
          X: =0
          Y: =0
          Width: =Parent.Width
          Height: =64
          Fill: =varNavy2
          BorderStyle: =BorderStyle.None

    - lblLogLogo As label:
        Properties:
          X: =8
          Y: =8
          Width: =48
          Height: =48
          Fill: =varGold
          Color: =varNavy
          Text: ="D"
          Size: =22
          FontWeight: =FontWeight.Bold
          Align: =Align.Center
          VerticalAlign: =VerticalAlign.Middle
          RadiusTopLeft: =6
          RadiusTopRight: =6
          RadiusBottomLeft: =6
          RadiusBottomRight: =6
          BorderStyle: =BorderStyle.None

    - lblLogTitle As label:
        Properties:
          X: =64
          Y: =0
          Width: =300
          Height: =64
          Text: ="Log a Check"
          Color: =varGoldSoft
          Fill: =RGBA(0,0,0,0)
          Size: =20
          FontWeight: =FontWeight.Bold
          VerticalAlign: =VerticalAlign.Middle
          BorderStyle: =BorderStyle.None

    # Back button (← Dashboard)
    - btnLogBack As button:
        Properties:
          X: =Parent.Width - 148
          Y: =14
          Width: =136
          Height: =36
          Text: ="← Dashboard"
          Fill: =varNavy
          Color: =varGoldSoft
          Size: =13
          RadiusTopLeft: =6
          RadiusTopRight: =6
          RadiusBottomLeft: =6
          RadiusBottomRight: =6
          BorderStyle: =BorderStyle.Solid
          BorderColor: =varGold
          BorderThickness: =1
          OnSelect: =Navigate(scrDashboard)

    # ── Edit form ────────────────────────────────────────────────────────────
    # STUDIO STEP: After pac canvas unpack, open scrLog in Studio and:
    #   1. Insert > Form > Edit Form
    #   2. Name it exactly: frmLog
    #   3. Set Data source to: DreamChecked_Logs
    #   4. In the Properties panel set Fields in this order:
    #        Category | Area / Asset | Check Type | Date Checked | Status | Next Due | Notes
    #   5. Set Default mode to: New
    # The YAML below sets all form-level properties; the data cards
    # are generated by Studio from the SharePoint schema.
    - frmLog As editForm:
        Properties:
          DataSource: =DreamChecked_Logs
          DefaultMode: =FormMode.New
          X: =80
          Y: =84
          Width: =Parent.Width - 160
          Height: =Parent.Height - 160
          Columns: =1
          BorderStyle: =BorderStyle.None
          Fill: =RGBA(0,0,0,0)
          # Called automatically when SubmitForm(frmLog) succeeds
          OnSuccess: |-
            =Navigate(scrHistory);
            Notify("Check saved ✓", NotificationType.Success)
          # Called if submit fails (e.g. connectivity)
          OnFailure: =Notify("Save failed — check your connection and try again.", NotificationType.Error)

    # ── Action buttons ───────────────────────────────────────────────────────
    - btnSave As button:
        Properties:
          X: =80
          Y: =Parent.Height - 60
          Width: =200
          Height: =44
          Text: ="Save Check"
          Fill: =varGold
          Color: =varNavy
          Size: =14
          FontWeight: =FontWeight.Bold
          RadiusTopLeft: =6
          RadiusTopRight: =6
          RadiusBottomLeft: =6
          RadiusBottomRight: =6
          BorderStyle: =BorderStyle.None
          OnSelect: =SubmitForm(frmLog)

    - btnCancelLog As button:
        Properties:
          X: =296
          Y: =Parent.Height - 60
          Width: =160
          Height: =44
          Text: ="Cancel"
          Fill: =RGBA(0,0,0,0)
          Color: =varMuted
          Size: =14
          RadiusTopLeft: =6
          RadiusTopRight: =6
          RadiusBottomLeft: =6
          RadiusBottomRight: =6
          BorderStyle: =BorderStyle.Solid
          BorderColor: =varMuted
          BorderThickness: =1
          OnSelect: =ResetForm(frmLog); Navigate(scrDashboard)
